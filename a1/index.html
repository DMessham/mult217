<html>

<head>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>

    <script type="text/javascript">
        // Your Processing.js code goes here

        // Special function `setup()` called ONCE before rendering phase
        function setup() {
            // Create a new 400x400 canvas element to do our sketching in
            let canvas = createCanvas(400, 400);

            // Optional, but without a 'parent' set, the canvas is added to the end of <main> by default
            canvas.parent('sketch-container');
        }

        // Special function `draw()` called repeatedly during the rendering phase
        function draw() {
            // when mouse button is pressed, circles turn black
            if (mouseIsPressed === true) {
                fill(0);
            } else {
                fill(255);
            }

            // Draw circle at mouse position
            circle(mouseX, mouseY, 100);
        }
    </script>
    <script type="text/javascript">
        function exportPNG() {
            // Add timestamp to export name for uniqueness
            let timestamp = new Date().getTime();

            // Call special P5.js function to save canvas
            saveCanvas('mySketch_' + timestamp, 'png');
        }
    </script>
</head>

<body>
    <header>
        <h1>My First p5.js Sketch</h1>
    </header>
    <main>
        <section>
            <h2>Sketch Area</h2>

            <div id="sketch-container"></div>
        </section>

        <section>
            <h2>Instructions</h2>
            <ul>
                <li>Drag to draw circles on the canvas.</li>
                <li>Click and hold to draw filled circles.</li>
            </ul>
            <button onclick="exportPNG()">Export PNG</button>
        </section>
    </main>
    <footer>
        <p>Created by Jesse Rolheiser</p>
    </footer>
</body>

</html>
